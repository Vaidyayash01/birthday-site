<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Happy Birthday ❤️</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #ff9a9e, #fad0c4);
    overflow: hidden;
    text-align: center;
    color: white;
}

.container {
    margin-top: 10%;
}

h1 {
    font-size: 50px;
}

.glass {
    margin: 30px auto;
    padding: 25px;
    width: 300px;
    background: rgba(255,255,255,0.2);
    border-radius: 20px;
    backdrop-filter: blur(10px);
}

button {
    padding: 12px 25px;
    border: none;
    border-radius: 10px;
    background: #ff4b5c;
    color: white;
    font-size: 18px;
    cursor: pointer;
}

#message {
    margin-top: 20px;
    font-size: 20px;
    min-height: 60px;
}

canvas {
    position: fixed;
    top: 0;
    left: 0;
    pointer-events: none;
}
</style>

</head>

<body>

<canvas id="confetti"></canvas>

<div class="container">
    <h1>🎉 Happy Birthday Didi 🎉</h1>

    <div class="glass">
        <p>Scan karne ke baad welcome 😄</p>

        <button onclick="startSurprise()">Unlock Surprise 🎁</button>

        <div id="message"></div>
    </div>
</div>

<audio id="music" loop>
    <source src=""https://www2.cs.uic.edu/~i101/SoundFiles/HappyBirthday.mp3"">
</audio>

<script>
// Typing effect
const text = "You are not just my sister... you are my strongest support 💖\nThank you for everything!\nEnjoy your special day 🎂✨";
let i = 0;

function typeWriter() {
    if (i < text.length) {
        document.getElementById("message").innerHTML += text.charAt(i);
        i++;
        setTimeout(typeWriter, 40);
    }
}

// Start everything
function startSurprise() {
    document.getElementById("music").play();
    typeWriter();
    startConfetti();
}

// Confetti
const canvas = document.getElementById("confetti");
const ctx = canvas.getContext("2d");
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let pieces = [];

for (let i = 0; i < 100; i++) {
    pieces.push({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        r: Math.random() * 6 + 2,
        d: Math.random() * 50
    });
}

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = "white";
    ctx.beginPath();

    for (let i = 0; i < pieces.length; i++) {
        let p = pieces[i];
        ctx.moveTo(p.x, p.y);
        ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2, true);
    }

    ctx.fill();
    update();
}

function update() {
    for (let i = 0; i < pieces.length; i++) {
        let p = pieces[i];
        p.y += Math.cos(p.d) + 1;
        p.x += Math.sin(p.d);

        if (p.y > canvas.height) {
            p.y = 0;
            p.x = Math.random() * canvas.width;
        }
    }
}

setInterval(draw, 20);
</script>

</body>
</html>
